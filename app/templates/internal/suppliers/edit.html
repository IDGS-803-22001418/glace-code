{% extends 'internal/base.html' %}
{% block title %}Proveedores - Modificar{% endblock %}

{% block content %}
<div>
    <!-- Back link -->
    <a href="{{ url_for('suppliers.index') }}"
        class="inline-flex items-center text-sm text-gray-500 hover:text-[#e91e63] mb-4 transition">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
        Volver a Proveedores
    </a>

    <!-- Title -->
    <div class="mb-6">
        <div class="flex items-center space-x-2 mb-1">
            <svg class="w-5 h-5 text-[#e91e63]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-width="2"
                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                </path>
            </svg>
            <span class="text-xs font-bold text-[#e91e63] uppercase tracking-wider">Maison Glacé</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900">Modificar Proveedor</h1>
    </div>

    <!-- Form -->
    <form method="POST" action="{{ url_for('suppliers.edit', id=proveedor.id) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="space-y-5">
            <!-- Row 1 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-2"><svg
                            class="w-4 h-4 mr-1.5 text-[#e91e63]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>Nombre de la Empresa</label>
                    <input type="text" name="nombre_empresa" required value="{{ proveedor.nombre_empresa }}"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:bg-white transition">
                </div>
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-2"><svg
                            class="w-4 h-4 mr-1.5 text-[#e91e63]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2"
                                d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1">
                            </path>
                        </svg>Categoría de Insumos</label>
                    <select name="categoria_insumos" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:bg-white transition">
                        <option value="">Seleccione una categoría</option>
                        {% for cat in categorias %}
                        <option value="{{ cat }}" {% if proveedor.categoria_insumos==cat %}selected{% endif %}>{{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Row 2 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-2"><svg
                            class="w-4 h-4 mr-1.5 text-[#e91e63]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>Nombre del Contacto</label>
                    <input type="text" name="nombre_contacto" required value="{{ proveedor.nombre_contacto or '' }}"
                        maxlength="100"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:bg-white transition">
                </div>
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-2"><svg
                            class="w-4 h-4 mr-1.5 text-[#e91e63]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                            </path>
                        </svg>Teléfono</label>
                    <input type="tel" name="telefono" required value="{{ proveedor.telefono or '' }}" maxlength="10"
                        pattern="[0-9]{10}" title="Ingresa exactamente 10 dígitos numéricos"
                        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:bg-white transition">
                </div>
            </div>

            <!-- Row 3 -->
            <div>
                <label class="flex items-center text-sm font-bold text-gray-700 mb-2"><svg
                        class="w-4 h-4 mr-1.5 text-[#e91e63]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>Correo Electrónico</label>
                <input type="email" name="correo_electronico" required value="{{ proveedor.correo_electronico or '' }}"
                    maxlength="100"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:bg-white transition">
            </div>

            <!-- Row 4 -->
            <div>
                <label class="flex items-center text-sm font-bold text-gray-700 mb-2"><svg
                        class="w-4 h-4 mr-1.5 text-[#e91e63]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2"
                            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                        </path>
                        <path stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>Dirección Física</label>
                <input type="text" name="direccion_fisica" required value="{{ proveedor.direccion_fisica or '' }}"
                    maxlength="200"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:bg-white transition">
            </div>

            <!-- Row 5 -->
            <div>
                <label class="flex items-center text-sm font-bold text-gray-700 mb-2"><svg
                        class="w-4 h-4 mr-1.5 text-[#e91e63]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                        </path>
                    </svg>Notas adicionales</label>
                <textarea name="notas_adicionales" rows="3" maxlength="500"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:bg-white transition resize-none">{{ proveedor.notas_adicionales or '' }}</textarea>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex items-center justify-end space-x-4 mt-8">
            <a href="{{ url_for('suppliers.index') }}"
                class="px-8 py-3 rounded-full border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition">Cancelar</a>
            <button type="submit"
                class="bg-primary rounded-2xl cursor-pointer text-white px-8 py-3 text-sm font-semibold hover:shadow-lg transition">Modificar
                Proveedor</button>
        </div>
    </form>
</div>
{% endblock %}
